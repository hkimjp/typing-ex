services:
  tp:
    image: eclipse-temurin:25-jre
    env_file: ".env"
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - "${PORT}:${PORT}"
    entrypoint: >
      sh -c "java -jar --enable-native-access=ALL-UNNAMED tp.jar"

  db:
    image: postgres:18
    env_file: ".env"
    restart: unless-stopped
    volumes:
      - data:/var/lib/postgresql
      - ./dumps:/dumps

  redis:
    image: redis:8
    env_file: ".env"
    restart: unless-stopped

volumes:
  data:
    driver: local
